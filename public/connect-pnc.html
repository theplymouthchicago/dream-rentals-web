<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Connect PNC - Dream Rentals</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1a1a2e;border-radius:20px;padding:48px;max-width:440px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.logo{font-size:48px;margin-bottom:16px}
h1{color:#c9a84c;font-size:24px;margin-bottom:8px;font-weight:700}
p{color:#888;margin-bottom:32px;line-height:1.6;font-size:15px}
button{background:linear-gradient(135deg,#c9a84c,#e8c97a);color:#1a1a2e;border:none;border-radius:12px;padding:18px 32px;font-size:17px;font-weight:700;cursor:pointer;width:100%;transition:opacity .2s}
button:hover{opacity:.9}
button:disabled{opacity:.5;cursor:not-allowed}
#status{margin-top:20px;font-size:14px;color:#888;min-height:24px}
.success{color:#4ade80!important;font-weight:600;font-size:16px}
.token{background:#0a0a15;border-radius:8px;padding:12px;margin-top:12px;word-break:break-all;font-size:11px;color:#c9a84c;text-align:left}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏦</div>
  <h1>Connect PNC Bank</h1>
  <p>Link your Dream Rentals PNC Business Checking for live balance tracking.<br><strong style="color:#c9a84c">Read-only — zero payment access.</strong></p>
  <button id="btn" onclick="go()">Connect PNC Bank Account</button>
  <div id="status"></div>
</div>
<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<script>
var LINK_TOKEN = 'link-production-a6775696-9af7-4171-8b2b-5b4bff91ead5';
var CLIENT_ID = '69dfca624f4141000dc0a788';
var SECRET = 'e11f5a08ebf988d1a8764053a97680';

var params = new URLSearchParams(window.location.search);
var oauthStateId = params.get('oauth_state_id');

if (oauthStateId) {
  document.getElementById('status').innerText = 'Resuming PNC connection...';
  openPlaid();
}

function openPlaid() {
  document.getElementById('btn').disabled = true;
  document.getElementById('status').innerText = 'Opening Plaid secure connection...';
  var config = {
    token: LINK_TOKEN,
    onSuccess: function(pt, md) {
      exchangeToken(pt);
    },
    onExit: function(e, md) {
      document.getElementById('btn').disabled = false;
      document.getElementById('status').innerText = e ? ('Error: ' + (e.display_message || e.error_message || JSON.stringify(e))) : 'Cancelled — try again.';
    },
    onLoad: function() { if (!oauthStateId) document.getElementById('status').innerText = ''; }
  };
  if (oauthStateId) {
    config.receivedRedirectUri = window.location.href;
  }
  var h = Plaid.create(config);
  h.open();
}

async function exchangeToken(public_token) {
  document.getElementById('status').innerText = 'Exchanging token with Plaid...';
  try {
    var r = await fetch('https://production.plaid.com/item/public_token/exchange', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({client_id: CLIENT_ID, secret: SECRET, public_token: public_token})
    });
    var data = await r.json();
    document.getElementById('status').innerHTML =
      '<div class="success">✅ PNC Connected! Send this to Jakobi:</div>' +
      '<div class="token"><strong>Access Token:</strong><br>' + data.access_token + '<br><br><strong>Item ID:</strong><br>' + data.item_id + '</div>';
    document.getElementById('btn').style.display = 'none';
  } catch(e) {
    document.getElementById('status').innerText = 'Exchange error: ' + e.message;
    document.getElementById('btn').disabled = false;
  }
}

function go() { openPlaid(); }
</script>
</body>
</html>
